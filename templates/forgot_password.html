{% extends "base.html" %}

{% block content %}

<div class="container py-3">


<div class="card border-0 shadow-sm rounded-4">

    <div class="card-body">

        <div class="text-center mb-4">

            <div style="font-size:60px;">
                🔑
            </div>

            <h3 class="fw-bold">
                Forgot Password
            </h3>

            <p class="text-muted mb-0">
                Reset your BoatMart account password
            </p>

        </div>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Mobile Number
                </label>

                <input
                    type="text"
                    name="mobile"
                    class="form-control"
                    placeholder="Enter Mobile Number"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    New Password
                </label>

                <input
                    type="password"
                    name="new_password"
                    class="form-control"
                    placeholder="Enter New Password"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Confirm Password
                </label>

                <input
                    type="password"
                    name="confirm_password"
                    class="form-control"
                    placeholder="Confirm New Password"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-primary w-100">

                Reset Password

            </button>

        </form>

        <a href="/login"
           class="btn btn-success w-100 mt-3">

            ← Back To Login

        </a>

    </div>

</div>


</div>

{% endblock %}
