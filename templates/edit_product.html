{% extends "base.html" %}

{% block content %}

<div class="container py-3">


<a href="/admin/products"
   class="btn btn-outline-secondary mb-3">

    ← Back

</a>

<div class="card border-0 shadow-sm rounded-4">

    <div class="card-body">

        <h3 class="fw-bold mb-4">

            ✏ Edit Product

        </h3>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Product Name
                </label>

                <input
                    type="text"
                    name="product_name"
                    value="{{ product[0] }}"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Price
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="price"
                    value="{{ product[1] }}"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Category
                </label>

                <select
                    name="category"
                    class="form-select">

                    <option value="{{ product[3] }}">
                        {{ product[3] }}
                    </option>

                    <option value="Drinks">Drinks</option>
                    <option value="Snacks">Snacks</option>
                    <option value="Grocery Items">Grocery Items</option>
                    <option value="Engine Oil & Lubricants">Engine Oil & Lubricants</option>
                    <option value="Fishing Equipment">Fishing Equipment</option>
                    <option value="Boat Accessories">Boat Accessories</option>

                </select>

            </div>

            <button
                type="submit"
                class="btn btn-warning w-100">

                💾 Save Changes

            </button>

        </form>

    </div>

</div>


</div>

{% endblock %}
