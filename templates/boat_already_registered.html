{% extends "base.html" %}

{% block content %}

<div class="container py-5">

<div class="card shadow-sm border-0 rounded-4 mx-auto"
     style="max-width:500px;">

    <div class="card-body text-center p-4">

        <div style="font-size:80px;">
            🚤
        </div>

        <h3 class="fw-bold text-danger mt-3">

            Boat Already Registered

        </h3>

        <p class="text-muted">

            This boat number is already
            registered in BoatMart.

        </p>

        <p class="text-muted">

            Please use another boat number
            or login with your existing account.

        </p>

        <a href="/owner-register"
           class="btn btn-primary w-100 mt-3">

            Try Again

        </a>

        <a href="/login"
           class="btn btn-outline-secondary w-100 mt-2">

            Login

        </a>

    </div>

</div>


</div>

{% endblock %}
