{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm mx-auto mt-4" style="max-width:500px;">

    <div class="card-body">

        <h3 class="text-center mb-4">
            Crew Registration
        </h3>

        <form method="POST">

            <input type="text"
                   name="boat_number"
                   class="form-control mb-3"
                   placeholder="Boat Number"
                   required>

            <input type="text"
                   name="name"
                   class="form-control mb-3"
                   placeholder="Full Name"
                   required>

            <input type="text"
                   name="mobile"
                   class="form-control mb-3"
                   placeholder="Mobile Number"
                   required>

            <input type="password"
                   name="password"
                   class="form-control mb-3"
                   placeholder="Password"
                   required>

            <button type="submit"
                    class="btn btn-primary w-100">

                Register

            </button>

        </form>

    </div>

</div>

{% endblock %}
