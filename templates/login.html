{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-12 col-sm-10 col-md-6 col-lg-4">

        <div class="card shadow border-0 rounded-4">

            <div class="card-body p-4">

                <div class="text-center mb-4">

                    <h2 class="fw-bold">
                        BoatMart
                    </h2>

                    <p class="text-muted">
                        Login to continue
                    </p>

                </div>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Mobile Number
                        </label>

                        <input
                            type="text"
                            name="mobile"
                            class="form-control"
                            placeholder="Enter mobile number"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter password"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">

                        Login

                    </button>
<div class="text-center mt-3">

    <a href="/forgot-password"
       class="text-decoration-none">
        Forgot Password?
    </a>

    <div class="mt-3">

    👨‍✈️ New User?
    <a href="/register"
       class="text-decoration-none fw-bold">
        Register
    </a>

</div>

<div>

    🚤 Boat Owner?
    <a href="/owner-register"
       class="text-decoration-none fw-bold text-success">
        Register
    </a>

</div>

</div>
                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
